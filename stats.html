<!doctype html>
<html lang="en" data-mode="minimal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Despresso — Stats</title>
  <script src="js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/minimal.css">
  <link rel="stylesheet" href="css/cyber.css">
</head>
<body data-page="stats">
  <nav class="site-nav">
    <div class="container nav-inner">
      <a class="logo" href="index.html">Despresso</a>
      <button id="hamburger" class="hamburger" aria-label="Open menu">☰</button>
      <div class="nav-links" id="nav-links">
        <a class="nav-link" data-page="home" href="index.html">Home</a>
        <a class="nav-link" data-page="tasks" href="tasks.html">Tasks</a>
        <a class="nav-link" data-page="achievements" href="achievements.html">Achievements</a>
        <a class="nav-link" data-page="stats" href="stats.html">Stats</a>
        <a class="nav-link" data-page="about" href="about.html">About</a>
        <button id="theme-toggle" class="theme-toggle">MINIMAL ● CYBER</button>
      </div>
    </div>
  </nav>
  <main class="container" style="padding:1.2rem 0 2rem">
    <h1>NEURAL ANALYTICS</h1>
    <p class="terminal-heading" style="font-family:var(--font-mono);color:var(--text-secondary)">&gt; ACCESSING AGENT PERFORMANCE DATABASE...</p>
    <section style="display:flex;gap:1rem;align-items:center;margin-bottom:1rem">
      <div class="hex-level" id="level-hex">LV</div>
      <svg width="96" height="96" viewBox="0 0 100 100" aria-label="XP Progress circle">
        <circle cx="50" cy="50" r="42" fill="none" stroke="var(--border)" stroke-width="8"></circle>
        <circle id="xp-arc" cx="50" cy="50" r="42" fill="none" stroke="var(--accent)" stroke-width="8" stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="120"></circle>
      </svg>
    </section>
    <section id="stats-root"></section>
  </main>
  <script src="js/utils.js"></script>
  <script src="js/gamification.js"></script>
  <script src="js/tasks.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      if (window.NexusGamification) {
        const level = window.NexusGamification.getLevel();
        document.getElementById("level-hex").textContent = `LV ${level}`;
        const percent = window.NexusGamification.getXPProgressPercent();
        document.getElementById("xp-arc").setAttribute("stroke-dashoffset", String(264 - ((percent / 100) * 264)));
      }
    });
  </script>
</body>
</html>
